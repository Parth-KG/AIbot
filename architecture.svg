<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <!-- Background -->
  <rect width="1000" height="520" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Trebuchet MS, Arial, sans-serif" font-size="22" font-weight="bold" fill="#0F172A">
    System Architecture
  </text>
  <text x="500" y="65" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#64748B" font-style="italic">
    Voice In → Vapi → FastAPI → Qdrant → Response
  </text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0D9488"/>
    </marker>
    <marker id="arrowNavy" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1E293B"/>
    </marker>
  </defs>

  <!-- USER PHONE (Left) -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="140" height="130" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <!-- Phone icon -->
    <rect x="50" y="20" width="40" height="60" rx="6" fill="none" stroke="#0D9488" stroke-width="2.5"/>
    <circle cx="70" cy="72" r="3" fill="#0D9488"/>
    <line x1="62" y1="30" x2="78" y2="30" stroke="#0D9488" stroke-width="2"/>
    <text x="70" y="105" text-anchor="middle" font-family="Trebuchet MS, Arial, sans-serif" font-size="14" font-weight="bold" fill="#0F172A">User</text>
    <text x="70" y="120" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#64748B">Phone Call</text>
  </g>

  <!-- Arrow: User → Vapi -->
  <line x1="205" y1="265" x2="280" y2="265" stroke="#0D9488" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <text x="242" y="255" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#0D9488" font-weight="bold">voice</text>

  <!-- VAPI (Left-Center) -->
  <g transform="translate(285, 200)">
    <rect x="0" y="0" width="140" height="130" rx="12" fill="#0D9488"/>
    <!-- Mic icon -->
    <rect x="60" y="20" width="20" height="30" rx="10" fill="#FFFFFF"/>
    <path d="M 50 45 Q 50 62, 70 62 Q 90 62, 90 45" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
    <line x1="70" y1="62" x2="70" y2="75" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="60" y1="75" x2="80" y2="75" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="70" y="100" text-anchor="middle" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Vapi</text>
    <text x="70" y="115" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#CCFBF1">STT / TTS</text>
  </g>

  <!-- Arrow: Vapi → FastAPI -->
  <line x1="430" y1="265" x2="505" y2="265" stroke="#0D9488" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <text x="467" y="255" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#0D9488" font-weight="bold">webhook</text>

  <!-- FASTAPI (Center) -->
  <g transform="translate(510, 200)">
    <rect x="0" y="0" width="140" height="130" rx="12" fill="#1E293B"/>
    <!-- Server icon -->
    <rect x="50" y="25" width="40" height="8" rx="1" fill="#14B8A6"/>
    <rect x="50" y="37" width="40" height="8" rx="1" fill="#14B8A6"/>
    <rect x="50" y="49" width="40" height="8" rx="1" fill="#14B8A6"/>
    <circle cx="85" cy="29" r="1.5" fill="#FFFFFF"/>
    <circle cx="85" cy="41" r="1.5" fill="#FFFFFF"/>
    <circle cx="85" cy="53" r="1.5" fill="#FFFFFF"/>
    <text x="70" y="85" text-anchor="middle" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">FastAPI</text>
    <text x="70" y="100" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#CBD5E1">Orchestration</text>
    <text x="70" y="115" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#CBD5E1">Business Logic</text>
  </g>

  <!-- Arrow: FastAPI → Qdrant (right) -->
  <line x1="655" y1="240" x2="730" y2="200" stroke="#0F766E" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <text x="685" y="210" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#0F766E" font-weight="bold">query</text>

  <!-- Arrow: Qdrant → FastAPI -->
  <line x1="730" y1="230" x2="655" y2="270" stroke="#0F766E" stroke-width="2.5" stroke-dasharray="4,3" marker-end="url(#arrowTeal)"/>
  <text x="685" y="290" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#0F766E" font-weight="bold">results</text>

  <!-- QDRANT (Right-Top) -->
  <g transform="translate(735, 120)">
    <rect x="0" y="0" width="140" height="130" rx="12" fill="#0F766E"/>
    <!-- DB icon -->
    <ellipse cx="70" cy="32" rx="25" ry="8" fill="#FFFFFF"/>
    <path d="M 45 32 L 45 48 Q 45 56, 70 56 Q 95 56, 95 48 L 95 32" fill="#FFFFFF"/>
    <path d="M 45 48 L 45 60 Q 45 68, 70 68 Q 95 68, 95 60 L 95 48" fill="#FFFFFF" opacity="0.7"/>
    <text x="70" y="95" text-anchor="middle" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Qdrant</text>
    <text x="70" y="110" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#CCFBF1">Vector DB</text>
    <text x="70" y="123" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#CCFBF1">Scheme Embeddings</text>
  </g>

  <!-- Arrow: FastAPI → LLM (down) -->
  <line x1="655" y1="295" x2="730" y2="335" stroke="#1E293B" stroke-width="2.5" marker-end="url(#arrowNavy)"/>
  <text x="685" y="340" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#1E293B" font-weight="bold">prompt</text>

  <!-- Arrow: LLM → FastAPI -->
  <line x1="730" y1="365" x2="655" y2="325" stroke="#1E293B" stroke-width="2.5" stroke-dasharray="4,3" marker-end="url(#arrowNavy)"/>
  <text x="690" y="385" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#1E293B" font-weight="bold">response</text>

  <!-- LLM (Right-Bottom) -->
  <g transform="translate(735, 340)">
    <rect x="0" y="0" width="140" height="120" rx="12" fill="#FFFFFF" stroke="#1E293B" stroke-width="2"/>
    <!-- Brain icon -->
    <circle cx="70" cy="35" r="18" fill="none" stroke="#1E293B" stroke-width="2.5"/>
    <path d="M 60 28 Q 65 22, 70 28 Q 75 22, 80 28" stroke="#1E293B" stroke-width="2" fill="none"/>
    <path d="M 60 42 Q 65 48, 70 42 Q 75 48, 80 42" stroke="#1E293B" stroke-width="2" fill="none"/>
    <text x="70" y="82" text-anchor="middle" font-family="Trebuchet MS, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0F172A">LLM</text>
    <text x="70" y="98" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#64748B">OpenAI /</text>
    <text x="70" y="110" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#64748B">Anthropic</text>
  </g>

  <!-- Return flow indicator -->
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="620" height="80" rx="10" fill="#CCFBF1"/>
    <text x="20" y="28" font-family="Trebuchet MS, Arial, sans-serif" font-size="13" font-weight="bold" fill="#0F766E">RESPONSE FLOW</text>
    <text x="20" y="52" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#334155">
      Qdrant results + LLM reasoning → FastAPI builds response → Vapi TTS →
    </text>
    <text x="20" y="70" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#334155">
      User hears natural voice reply in Hindi or English
    </text>
  </g>

  <!-- Footer -->
  <text x="500" y="500" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#94A3B8" font-style="italic">
    SarkariSahayak · Team Batman · HackBlr 2026
  </text>
</svg>
